name: 🎵 Daily Hip-Hop Releases Tracker

on:
  schedule:
    # 23:00 UTC = 01:00 in Paris during summer time, 00:00 in winter.
    - cron: '0 23 * * *'

  # Allow manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-releases:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🎵 Run hip-hop tracker
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python spotify_hiphop_tracker.py

      - name: 💾 Commit CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases.csv releases_history.csv
          git diff --cached --quiet && exit 0
          git commit -m "Update daily hip-hop releases"
          git push
