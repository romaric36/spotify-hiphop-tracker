name: 🎵 Daily Hip-Hop Releases Tracker

on:
  schedule:
    # Runs at 23:00 UTC = 01:00 AM Paris (CEST, UTC+2) in summer
    # Adjust to "0 0 * * *" in winter (CET, UTC+1)
    - cron: '0 23 * * *'

  # Allow manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  track-releases:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🎵 Run hip-hop tracker
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python spotify_hiphop_tracker.py
